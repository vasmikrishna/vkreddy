<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#8a2be2"/>
    </linearGradient>
  </defs>
  <!-- Obsidian dark squircle background -->
  <rect width="32" height="32" rx="8" fill="#0a0915"/>
  <!-- Neon gradient border -->
  <rect x="0.75" y="0.75" width="30.5" height="30.5" rx="7.25" fill="none" stroke="url(#grad)" stroke-width="1.5"/>
  <!-- Stylized central brand character -->
  <text x="16" y="17.5" font-family="-apple-system, BlinkMacSystemFont, 'Outfit', sans-serif" font-weight="900" font-size="16" fill="#ffffff" text-anchor="middle" dominant-baseline="middle">V</text>
</svg>
